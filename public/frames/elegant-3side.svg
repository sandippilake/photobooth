<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 600" width="390" height="600">
  <!-- Left border -->
  <rect x="0" y="0" width="18" height="600" fill="#c9a96e"/>
  <rect x="4" y="0" width="2" height="600" fill="#f0d9a8"/>
  <rect x="14" y="0" width="2" height="600" fill="#f0d9a8"/>

  <!-- Right border -->
  <rect x="372" y="0" width="18" height="600" fill="#c9a96e"/>
  <rect x="374" y="0" width="2" height="600" fill="#f0d9a8"/>
  <rect x="384" y="0" width="2" height="600" fill="#f0d9a8"/>

  <!-- Top border -->
  <rect x="0" y="0" width="390" height="18" fill="#c9a96e"/>
  <rect x="0" y="4" width="390" height="2" fill="#f0d9a8"/>
  <rect x="0" y="14" width="390" height="2" fill="#f0d9a8"/>

  <!-- Corner ornaments -->
  <circle cx="20" cy="20" r="12" fill="#c9a96e" stroke="#f0d9a8" stroke-width="1.5"/>
  <circle cx="20" cy="20" r="6" fill="#f0d9a8"/>
  <circle cx="370" cy="20" r="12" fill="#c9a96e" stroke="#f0d9a8" stroke-width="1.5"/>
  <circle cx="370" cy="20" r="6" fill="#f0d9a8"/>

  <!-- Top center ornament -->
  <g transform="translate(195, 9)">
    <polygon points="0,-7 2,-2 7,-2 3,1 5,6 0,3 -5,6 -3,1 -7,-2 -2,-2" fill="#f0d9a8"/>
  </g>

  <!-- Left decorative line details -->
  <line x1="9" y1="50" x2="9" y2="100" stroke="#f0d9a8" stroke-width="1" opacity="0.6"/>
  <circle cx="9" cy="150" r="3" fill="#f0d9a8" opacity="0.6"/>
  <line x1="9" y1="200" x2="9" y2="250" stroke="#f0d9a8" stroke-width="1" opacity="0.6"/>
  <circle cx="9" cy="300" r="3" fill="#f0d9a8" opacity="0.6"/>
  <line x1="9" y1="350" x2="9" y2="400" stroke="#f0d9a8" stroke-width="1" opacity="0.6"/>
  <circle cx="9" cy="450" r="3" fill="#f0d9a8" opacity="0.6"/>
  <line x1="9" y1="500" x2="9" y2="550" stroke="#f0d9a8" stroke-width="1" opacity="0.6"/>

  <!-- Right decorative line details -->
  <line x1="381" y1="50" x2="381" y2="100" stroke="#f0d9a8" stroke-width="1" opacity="0.6"/>
  <circle cx="381" cy="150" r="3" fill="#f0d9a8" opacity="0.6"/>
  <line x1="381" y1="200" x2="381" y2="250" stroke="#f0d9a8" stroke-width="1" opacity="0.6"/>
  <circle cx="381" cy="300" r="3" fill="#f0d9a8" opacity="0.6"/>
  <line x1="381" y1="350" x2="381" y2="400" stroke="#f0d9a8" stroke-width="1" opacity="0.6"/>
  <circle cx="381" cy="450" r="3" fill="#f0d9a8" opacity="0.6"/>
  <line x1="381" y1="500" x2="381" y2="550" stroke="#f0d9a8" stroke-width="1" opacity="0.6"/>

  <!-- Bottom text area background -->
  <rect x="0" y="520" width="390" height="80" fill="#c9a96e" opacity="0.85"/>
  <rect x="0" y="520" width="390" height="2" fill="#f0d9a8"/>
  <line x1="20" y1="530" x2="370" y2="530" stroke="#f0d9a8" stroke-width="0.5" opacity="0.5"/>
