<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 600" width="390" height="600">
  <!-- Left bar gradient effect with stripes -->
  <rect x="0" y="0" width="28" height="600" fill="#ff6b35"/>
  <rect x="6" y="0" width="4" height="600" fill="#ff9a5c" opacity="0.7"/>
  <rect x="18" y="0" width="4" height="600" fill="#ff9a5c" opacity="0.7"/>

  <!-- Right bar -->
  <rect x="362" y="0" width="28" height="600" fill="#ff6b35"/>
  <rect x="368" y="0" width="4" height="600" fill="#ff9a5c" opacity="0.7"/>
  <rect x="380" y="0" width="4" height="600" fill="#ff9a5c" opacity="0.7"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="390" height="28" fill="#ff6b35"/>
  <rect x="0" y="6" width="390" height="4" fill="#ff9a5c" opacity="0.7"/>
  <rect x="0" y="18" width="390" height="4" fill="#ff9a5c" opacity="0.7"/>

  <!-- Corner stars -->
  <g fill="#ffe066" transform="translate(14,14)">
    <polygon points="0,-12 3,-4 11,-4 5,1 7,10 0,5 -7,10 -5,1 -11,-4 -3,-4"/>
  </g>
  <g fill="#ffe066" transform="translate(376,14)">
    <polygon points="0,-12 3,-4 11,-4 5,1 7,10 0,5 -7,10 -5,1 -11,-4 -3,-4"/>
  </g>

  <!-- Confetti dots on left bar -->
  <circle cx="14" cy="80" r="5" fill="#ffe066"/>
  <circle cx="14" cy="140" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="14" cy="200" r="5" fill="#ffe066"/>
  <circle cx="14" cy="260" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="14" cy="320" r="5" fill="#ffe066"/>
  <circle cx="14" cy="380" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="14" cy="440" r="5" fill="#ffe066"/>
  <circle cx="14" cy="500" r="4" fill="#fff" opacity="0.8"/>

  <!-- Right bar dots -->
  <circle cx="376" cy="80" r="5" fill="#ffe066"/>
  <circle cx="376" cy="140" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="376" cy="200" r="5" fill="#ffe066"/>
  <circle cx="376" cy="260" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="376" cy="320" r="5" fill="#ffe066"/>
  <circle cx="376" cy="380" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="376" cy="440" r="5" fill="#ffe066"/>
  <circle cx="376" cy="500" r="4" fill="#fff" opacity="0.8"/>

  <!-- Top bar dots -->
  <circle cx="80" cy="14" r="4" fill="#ffe066"/>
  <circle cx="140" cy="14" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="195" cy="14" r="5" fill="#ffe066"/>
  <circle cx="250" cy="14" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="310" cy="14" r="4" fill="#ffe066"/>

  <!-- Bottom caption band -->
  <rect x="0" y="516" width="390" height="84" fill="#ff6b35"/>
  <rect x="0" y="516" width="390" height="4" fill="#ffe066"/>
  <rect x="0" y="518" width="390" height="2" fill="#fff" opacity="0.3"/>
</svg>
